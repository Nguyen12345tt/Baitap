<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 60%;
        }
        .container img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            object-fit: cover;
        }
        .grid-item {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-item item1"><img src="Anh bt/image1.jpeg" alt="Image 1"></div>
        <div class="grid-item item2"><img src="Anh bt/image2.jpg" alt="Image 2"></div>
        <div class="grid-item item3"><img src="Anh bt/image3.jpg" alt="Image 3"></div>
        <div class="grid-item"><img src="Anh bt/image4.jpg" alt="Image 4"></div>
        <div class="grid-item"><img src="Anh bt/image5.jpeg" alt="Image 5"></div>
        <div class="grid-item"><img src="Anh bt/image6.jpeg" alt="Image 6"></div>
    </div>
</body>
</html>
